<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Edit Appointment</title>
</head>
<body>
  <h1>Edit Appointment</h1>

  <form id="form">
    <div>
      <label>Customer Name: <input name="customerName" required /></label>
    </div>
    <div>
      <label>Service: <input name="service" required /></label>
    </div>
    <div>
      <label>Date: <input name="date" required /></label>
    </div>
    <div>
      <label>Time: <input name="time" required /></label>
    </div>
    <div>
      <label>Notes: <input name="notes" /></label>
    </div>

    <button type="submit">Save</button>
    <button type="button" id="deleteBtn">Delete</button>
  </form>

  <p><a href="/">Back</a></p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    async function load() {
      const res = await fetch(`/api/appointments/${id}`);
      if (!res.ok) { alert("Not found"); return; }
      const a = await res.json();

      const form = document.getElementById("form");
      form.customerName.value = a.customerName;
      form.service.value = a.service;
      form.date.value = a.date;
      form.time.value = a.time;
      form.notes.value = a.notes || "";
    }

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = Object.fromEntries(fd.entries());

      const res = await fetch(`/api/appointments/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const err = await res.json();
        alert("Error: " + (err.error || "Unknown"));
        return;
      }
      window.location.href = "/";
    });

    document.getElementById("deleteBtn").addEventListener("click", async () => {
      if (!confirm("Delete this appointment?")) return;
      const res = await fetch(`/api/appointments/${id}`, { method: "DELETE" });
      if (!res.ok) { alert("Delete failed"); return; }
      window.location.href = "/";
    });

    load();
  </script>
</body>
</html>
