<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CMPE 131 Starter - Appointments</title>
</head>
<body>
  <h1>Appointments (Starter)</h1>

  <p>
    <a href="/create.html">Create a new appointment</a>
  </p>

  <button id="refreshBtn">Refresh List</button>
  <ul id="list"></ul>

  <script>
    async function load() {
      const res = await fetch("/api/appointments");
      const items = await res.json();
      const ul = document.getElementById("list");
      ul.innerHTML = "";

      items.forEach(a => {
        const li = document.createElement("li");
        li.innerHTML = `
          <b>#${a.id}</b> ${a.customerName} - ${a.service} (${a.date} ${a.time})
          <a href="/edit.html?id=${a.id}">edit</a>
        `;
        ul.appendChild(li);
      });
    }

    document.getElementById("refreshBtn").addEventListener("click", load);
    load();
  </script>
</body>
</html>
